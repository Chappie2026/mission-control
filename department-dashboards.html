<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control — Visionary Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111827;
            --surface-light: #1e293b;
            --accent: #00D4AA;
            --accent-blue: #3b82f6;
            --accent-amber: #FFB347;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        /* Nav */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .top-nav .logo {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent);
        }
        .top-nav .logo span { color: var(--text-muted); font-weight: 400; }
        .top-nav .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .top-nav .nav-links a:hover { color: var(--accent); }
        .top-nav .nav-links a.active { color: var(--accent); }

        /* Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 24px;
        }
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        /* System Status Bar */
        .sys-bar {
            grid-column: 1 / -1;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 16px 20px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .sys-metric {
            display: flex;
            flex-direction: column;
        }
        .sys-metric .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .sys-metric .value {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .sys-metric .value.ok { color: var(--success); }
        .sys-metric .value.warn { color: var(--warning); }

        /* Department Cards */
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .dept-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s, transform 0.15s;
        }
        .dept-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .dept-card .dept-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .dept-card .dept-name {
            font-size: 1rem;
            font-weight: 700;
        }
        .dept-card .dept-slug {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-badge.active { background: rgba(34,197,94,0.15); color: var(--success); }
        .status-badge.working { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
        .status-badge.ready { background: rgba(148,163,184,0.15); color: var(--text-muted); }
        .status-badge.error { background: rgba(239,68,68,0.15); color: var(--danger); }
        .dept-card .dept-scope {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .dept-card .dept-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .dept-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface-light);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .dept-card .current-task {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
        }
        .dept-card .current-task .task-label {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .dept-card .current-task .task-name {
            color: var(--text);
            font-weight: 500;
            margin-top: 4px;
        }

        /* Activity Feed */
        .feed-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            position: sticky;
            top: 80px;
        }
        .feed-panel h3 {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .feed-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .feed-item:last-child { border-bottom: none; }
        .feed-item .feed-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .feed-item .feed-dept {
            font-weight: 600;
            color: var(--accent);
        }
        .feed-item .feed-msg {
            color: var(--text);
            margin-top: 2px;
        }

        /* Project connections */
        .project-conn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--surface-light);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .project-conn .proj-name { font-weight: 600; }
        .project-conn .proj-depts { color: var(--text-muted); }
        .project-conn .proj-arrow { color: var(--accent); font-weight: 700; }

        /* Section Headers */
        .section-header {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin: 20px 0 12px 0;
        }

        /* Auto-refresh indicator */
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .refresh-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">🧠 Mission Control <span>/ Visionary Solutions</span></div>
        <div class="nav-links">
            <a href="/department-dashboards.html" class="active">Departments</a>
            <a href="/mind-board.html">Mind Board</a>
            <a href="/api/brain-graph.json" target="_blank">Graph API</a>
            <a href="http://localhost:8201" target="_blank">Nova</a>
        </div>
        <div class="refresh-indicator">
            <div class="refresh-dot"></div>
            <span id="last-refresh">Live</span>
        </div>
    </nav>

    <div class="main-grid">
        <!-- System Status -->
        <div class="sys-bar" id="sys-bar">
            <div class="sys-metric"><span class="label">Gateway</span><span class="value ok">● Running</span></div>
            <div class="sys-metric"><span class="label">RAM</span><span class="value" id="ram-val">63%</span></div>
            <div class="sys-metric"><span class="label">Disk</span><span class="value">7%</span></div>
            <div class="sys-metric"><span class="label">Load</span><span class="value ok">0.35</span></div>
            <div class="sys-metric"><span class="label">Cron Jobs</span><span class="value">9 active</span></div>
            <div class="sys-metric"><span class="label">Departments</span><span class="value ok">10 ready</span></div>
            <div class="sys-metric"><span class="label">Model</span><span class="value" style="font-size:0.8rem">Copilot Premium</span></div>
        </div>

        <!-- Left: Departments -->
        <div>
            <div class="section-header">Active Project Connections</div>
            <div id="project-connections"></div>

            <div class="section-header" style="margin-top:24px">Departments</div>
            <div class="dept-grid" id="dept-grid"></div>
        </div>

        <!-- Right: Activity Feed -->
        <div class="feed-panel">
            <h3>Activity Feed</h3>
            <div id="activity-feed"></div>
        </div>
    </div>

    <script>
        // Department data — auto-updated by Chappie cron
        const departments = [
            {
                name: 'Marketing',
                slug: 'marketing-claw',
                emoji: '🎨',
                status: 'working',
                statusText: 'Working',
                scope: 'Copywriting, visuals, pain-point messaging, conversion optimization, branding',
                tags: ['copy', 'design', 'branding', 'conversion'],
                currentTask: 'Nova Debt Helper — Hero brief & visual direction delivered ✅'
            },
            {
                name: 'Build',
                slug: 'build-claw',
                emoji: '🔨',
                status: 'working',
                statusText: 'Working',
                scope: 'Website builds, code changes, deployments, technical implementation',
                tags: ['html', 'css', 'tailwind', 'deploy', 'nginx'],
                currentTask: 'Nova Debt Helper — Skeleton page deployed at :8201 ✅'
            },
            {
                name: 'Finance',
                slug: 'finance-claw',
                emoji: '💰',
                status: 'ready',
                statusText: 'Ready',
                scope: 'Money, debt, budgeting, Nova Debt Helper financial logic, calculations, reporting',
                tags: ['debt', 'budget', 'calculations', 'reporting'],
                currentTask: null
            },
            {
                name: 'Research',
                slug: 'research-claw',
                emoji: '🔍',
                status: 'ready',
                statusText: 'Ready',
                scope: 'Market research, competitor analysis, pain-point validation',
                tags: ['market-research', 'competitors', 'validation'],
                currentTask: null
            },
            {
                name: 'Trading',
                slug: 'trading-claw',
                emoji: '📊',
                status: 'active',
                statusText: 'Active',
                scope: 'Automated trading, market analysis, signal generation',
                tags: ['trading', 'signals', 'market-analysis'],
                currentTask: 'Health monitoring active (10m interval)'
            },
            {
                name: 'Security',
                slug: 'security-claw',
                emoji: '🛡️',
                status: 'ready',
                statusText: 'Ready',
                scope: 'Infrastructure security, vulnerability assessment, hardening',
                tags: ['security', 'vulns', 'hardening'],
                currentTask: null
            },
            {
                name: 'Legal',
                slug: 'legal-claw',
                emoji: '⚖️',
                status: 'ready',
                statusText: 'Ready',
                scope: 'Compliance, terms, privacy policies, regulatory review',
                tags: ['compliance', 'privacy', 'terms'],
                currentTask: null
            },
            {
                name: 'Data & Analytics',
                slug: 'data-claw',
                emoji: '📈',
                status: 'ready',
                statusText: 'Ready',
                scope: 'Data pipelines, analytics, reporting, dashboards',
                tags: ['data', 'analytics', 'pipelines'],
                currentTask: null
            },
            {
                name: 'Maintenance',
                slug: 'maintenance-claw',
                emoji: '🔧',
                status: 'active',
                statusText: 'Active',
                scope: 'System upkeep, updates, monitoring, infrastructure health',
                tags: ['monitoring', 'updates', 'health'],
                currentTask: 'Infra health cron (30m), memory health (5m)'
            },
            {
                name: 'Red Team',
                slug: 'red-team-claw',
                emoji: '🔴',
                status: 'ready',
                statusText: 'Ready',
                scope: 'Penetration testing, attack simulation, security auditing',
                tags: ['pentest', 'attack-sim', 'audit'],
                currentTask: null
            }
        ];

        // Active project connections
        const projects = [
            { name: 'Nova Debt Helper Redesign', depts: ['marketing-claw', 'build-claw'], status: 'in_progress' },
            { name: 'Mission Control Dashboard', depts: ['maintenance-claw', 'data-claw'], status: 'active' },
            { name: 'Trading Engine', depts: ['trading-claw'], status: 'active' },
            { name: 'YouTube Shorts Pipeline', depts: ['build-claw', 'marketing-claw'], status: 'queued' },
            { name: 'Cloudflare AI Integration', depts: ['maintenance-claw'], status: 'in_progress' }
        ];

        // Activity feed
        const activities = [
            { time: '03:02', dept: 'build-claw', msg: 'Nova skeleton page deployed at port 8201 — 200 OK' },
            { time: '02:58', dept: 'marketing-claw', msg: 'Hero brief delivered: "Your Debt Has an Exit. Nova Finds It."' },
            { time: '02:55', dept: 'build-claw', msg: 'Nova nginx.conf created, index.html skeleton built' },
            { time: '02:53', dept: 'chappie', msg: '10 department workspaces created with full isolation' },
            { time: '02:52', dept: 'chappie', msg: 'AGENTS.md updated with iron delegation rules' },
            { time: '02:46', dept: 'chappie', msg: 'Cloudflare AI Gateway provider configured' },
            { time: '02:40', dept: 'chappie', msg: 'Brain layer + Mind Board deployed' },
            { time: '02:29', dept: 'chappie', msg: 'Ontology skill installed, graph seeded (23 entities)' }
        ];

        // Render departments
        const grid = document.getElementById('dept-grid');
        departments.forEach(d => {
            const card = document.createElement('div');
            card.className = 'dept-card';
            card.innerHTML = `
                <div class="dept-header">
                    <div>
                        <div class="dept-name">${d.emoji} ${d.name}</div>
                        <div class="dept-slug">${d.slug}</div>
                    </div>
                    <span class="status-badge ${d.status}">${d.statusText}</span>
                </div>
                <div class="dept-scope">${d.scope}</div>
                <div class="dept-tags">${d.tags.map(t => `<span class="dept-tag">${t}</span>`).join('')}</div>
                ${d.currentTask ? `<div class="current-task"><div class="task-label">Current Task</div><div class="task-name">${d.currentTask}</div></div>` : ''}
            `;
            grid.appendChild(card);
        });

        // Render project connections
        const projDiv = document.getElementById('project-connections');
        projects.forEach(p => {
            const statusColor = p.status === 'in_progress' ? 'var(--accent-blue)' : p.status === 'active' ? 'var(--success)' : 'var(--text-muted)';
            projDiv.innerHTML += `
                <div class="project-conn">
                    <span style="color:${statusColor};font-size:0.7rem;font-weight:600;text-transform:uppercase">${p.status.replace('_',' ')}</span>
                    <span class="proj-name">${p.name}</span>
                    <span class="proj-arrow">→</span>
                    <span class="proj-depts">${p.depts.join(' + ')}</span>
                </div>
            `;
        });

        // Render activity feed
        const feed = document.getElementById('activity-feed');
        activities.forEach(a => {
            feed.innerHTML += `
                <div class="feed-item">
                    <div class="feed-time">${a.time} MDT</div>
                    <div><span class="feed-dept">${a.dept}</span></div>
                    <div class="feed-msg">${a.msg}</div>
                </div>
            `;
        });

        // Auto-refresh timestamp
        document.getElementById('last-refresh').textContent = `Updated ${new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}`;
    </script>
</body>
</html>
