<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads | Mission Control</title>
  <style>
    :root{--bg:#0d1b2a;--panel:#1a2d42;--panel-soft:#1e3350;--text:#e2eaf3;--muted:#8aa5bf;--line:#2a3f55;--accent:#2cb1bc;--success:#2ec46a;--danger:#e05555;--warning:#f0b429;--radius:14px}
    [data-theme="light"]{--bg:#f4f8fb;--panel:#fff;--panel-soft:#eef4f8;--text:#102a43;--muted:#486581;--line:#d9e2ec}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:16px}
    .topbar-logo{font-weight:800;font-size:1.1rem;color:var(--accent)}
    .topbar-title{font-weight:700;font-size:1rem;flex:1}
    .topbar-btn{padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--panel-soft);color:var(--text);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s}
    .topbar-btn:hover{border-color:var(--accent)}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
    .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin-bottom:6px}
    .stat-value{font-size:1.6rem;font-weight:800}
    .stat-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
    .table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
    .table-header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    .table-header h2{font-size:1rem;font-weight:800}
    .refresh-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel-soft);color:var(--text);font-weight:700;font-size:.8rem;cursor:pointer}
    .refresh-btn:hover{border-color:var(--accent)}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:12px 16px;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;border-bottom:1px solid var(--line)}
    td{padding:10px 16px;font-size:.88rem;border-bottom:1px solid var(--line)}
    tr:last-child td{border-bottom:none}
    tr:hover{background:var(--panel-soft)}
    .badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.7rem;font-weight:800}
    .badge-hybrid{background:rgba(44,177,188,.15);color:var(--accent)}
    .badge-snowball{background:rgba(46,196,106,.15);color:var(--success)}
    .badge-avalanche{background:rgba(240,180,41,.15);color:var(--warning)}
    .badge-none{background:rgba(138,165,191,.1);color:var(--muted)}
    .empty{text-align:center;padding:48px;color:var(--muted);font-size:.95rem}
    @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}table{font-size:.8rem}th,td{padding:8px 10px}}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="whiteboard.html" class="topbar-logo">🤖 Chappie</a>
    <div class="topbar-title">Leads Dashboard</div>
    <button class="topbar-btn" onclick="toggleTheme()">🌓</button>
  </div>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="table-wrap">
      <div class="table-header">
        <h2>📋 All Leads</h2>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
      <div id="tableBody"></div>
    </div>
  </div>
  <script>
    const API_STATS = 'https://nova-api.jhobbie2020.workers.dev/stats?token=visionary2026';
    const API_LEADS = 'https://nova-api.jhobbie2020.workers.dev/leads?token=visionary2026&limit=100';

    function toggleTheme(){const h=document.documentElement;const c=h.getAttribute('data-theme');h.setAttribute('data-theme',c==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'))}
    const s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s);

    async function loadData(){
      try{
        const [statsRes,leadsRes]=await Promise.all([fetch(API_STATS),fetch(API_LEADS)]);
        const stats=await statsRes.json();
        const leadsData=await leadsRes.json();

        document.getElementById('stats').innerHTML=`
          <div class="stat"><div class="stat-label">Total Leads</div><div class="stat-value" style="color:var(--accent)">${stats.total_leads||0}</div></div>
          <div class="stat"><div class="stat-label">Today</div><div class="stat-value" style="color:var(--success)">${stats.today_leads||0}</div></div>
          <div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">${stats.total_sessions||0}</div></div>
          <div class="stat"><div class="stat-label">AI Mode</div><div class="stat-value" style="color:var(--accent);font-size:1rem">${stats.ai_mode||'—'}</div></div>
        `;

        const leads=leadsData.leads||[];
        if(!leads.length){document.getElementById('tableBody').innerHTML='<div class="empty">No leads yet</div>';return}

        let rows=leads.map(l=>{
          const plan=l.recommended_plan||'none';
          const badge=plan==='hybrid'?'badge-hybrid':plan==='snowball'?'badge-snowball':plan==='avalanche'?'badge-avalanche':'badge-none';
          const date=l.created_at?new Date(l.created_at).toLocaleDateString():'—';
          return `<tr>
            <td><strong>${l.first_name||'—'}</strong></td>
            <td>${l.email||'—'}</td>
            <td>${l.feedback?(l.feedback.length>60?l.feedback.slice(0,60)+'…':l.feedback):'—'}</td>
            <td><span class="badge ${badge}">${plan}</span></td>
            <td>${l.months_to_free||'—'}</td>
            <td>${date}</td>
          </tr>`;
        }).join('');

        document.getElementById('tableBody').innerHTML=`<table>
          <thead><tr><th>Name</th><th>Email</th><th>Feedback</th><th>Plan</th><th>Months</th><th>Date</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      }catch(e){
        document.getElementById('tableBody').innerHTML=`<div class="empty">Error loading leads: ${e.message}</div>`;
      }
    }
    loadData();
  </script>
</body>
</html>
