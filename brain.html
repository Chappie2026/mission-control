<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chappie Brain | Mission Control</title>
  <script src="./brain-data.js"></script>
  <style>
    :root {
      --bg: #f4f8fb; --panel: #ffffff; --panel-soft: #eef4f8;
      --text: #102a43; --muted: #486581; --line: #d9e2ec;
      --accent: #2cb1bc; --accent2: #f0b429; --shadow: 0 8px 32px rgba(16,42,67,.08);
      --radius: 18px; --max: 1300px;
    }
    [data-theme="dark"] {
      --bg: #0d1b2a; --panel: #1a2d42; --panel-soft: #1e3350;
      --text: #e2eaf3; --muted: #8aa5bf; --line: #2a3f55;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* TOP BAR */
    .top-bar {
      background: var(--panel); border-bottom: 1px solid var(--line);
      padding: 14px 28px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .top-bar a { color: var(--accent); font-weight: 700; font-size: .9rem; text-decoration: none; }
    .top-bar h1 { font-size: 1.1rem; flex: 1; }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 8px 14px 8px 36px; border: 1.5px solid var(--line);
      border-radius: 999px; background: var(--panel-soft); color: var(--text);
      font-size: .9rem; outline: none; width: 260px;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .85rem; }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 60px); }

    /* SIDEBAR */
    .sidebar {
      background: var(--panel); border-right: 1px solid var(--line);
      padding: 20px 0; overflow-y: auto; position: sticky; top: 60px;
      height: calc(100vh - 60px);
    }
    .sidebar-title { font-size: .72rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: 0 20px 10px; }

    .folder-item {
      padding: 10px 20px; cursor: pointer; display: flex; align-items: center;
      gap: 10px; font-size: .9rem; font-weight: 600; border-left: 3px solid transparent;
      transition: all .15s;
    }
    .folder-item:hover { background: var(--panel-soft); }
    .folder-item.active { background: var(--panel-soft); border-left-color: var(--accent); color: var(--accent); }
    .folder-item .count { margin-left: auto; background: var(--panel-soft); color: var(--muted); font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .folder-item.active .count { background: rgba(44,177,188,.15); color: var(--accent); }

    /* MAIN CONTENT */
    .main { padding: 28px; overflow-y: auto; }

    /* FILE LIST */
    .folder-header { margin-bottom: 20px; }
    .folder-header h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .folder-header p { color: var(--muted); font-size: .9rem; }

    .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

    .file-card {
      background: var(--panel); border: 1.5px solid var(--line); border-radius: var(--radius);
      padding: 18px; cursor: pointer; transition: all .2s;
    }
    .file-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .file-card h3 { font-size: .95rem; margin-bottom: 6px; }
    .file-card p { font-size: .8rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .file-card .file-icon { font-size: 1.4rem; margin-bottom: 10px; }

    /* FILE VIEWER */
    .file-viewer {
      display: none; background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 28px; max-width: 860px;
    }
    .file-viewer.active { display: block; }
    .file-viewer-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .file-viewer-header h2 { font-size: 1.2rem; flex: 1; }
    .back-btn {
      padding: 8px 16px; border: 1.5px solid var(--line); border-radius: 10px;
      background: var(--panel-soft); color: var(--text); cursor: pointer; font-size: .85rem; font-weight: 700;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* MARKDOWN STYLES */
    .md-content { line-height: 1.7; font-size: .92rem; }
    .md-content h1 { font-size: 1.4rem; margin: 0 0 16px; color: var(--accent); }
    .md-content h2 { font-size: 1.15rem; margin: 24px 0 10px; color: var(--text); border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    .md-content h3 { font-size: 1rem; margin: 18px 0 8px; color: var(--text); }
    .md-content p { margin-bottom: 12px; color: var(--muted); }
    .md-content strong { color: var(--text); }
    .md-content ul, .md-content ol { padding-left: 22px; margin-bottom: 12px; }
    .md-content li { color: var(--muted); margin-bottom: 5px; }
    .md-content code { background: var(--panel-soft); padding: 2px 6px; border-radius: 5px; font-size: .85rem; font-family: monospace; color: var(--accent); }
    .md-content pre { background: var(--panel-soft); padding: 16px; border-radius: 12px; overflow-x: auto; margin-bottom: 16px; }
    .md-content pre code { background: none; padding: 0; color: var(--text); font-size: .85rem; }
    .md-content blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--muted); margin: 12px 0; }
    .md-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: .87rem; }
    .md-content th { background: var(--panel-soft); padding: 10px 14px; text-align: left; font-weight: 700; border-bottom: 2px solid var(--line); }
    .md-content td { padding: 9px 14px; border-bottom: 1px solid var(--line); color: var(--muted); }
    .md-content hr { border: none; border-top: 1px solid var(--line); margin: 20px 0; }

    /* SEARCH RESULTS */
    .search-results { display: none; }
    .search-results.active { display: block; }
    .search-result { background: var(--panel); border: 1.5px solid var(--line); border-radius: 14px; padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all .15s; }
    .search-result:hover { border-color: var(--accent); }
    .search-result h4 { font-size: .92rem; margin-bottom: 4px; }
    .search-result p { font-size: .8rem; color: var(--muted); }
    .search-result .folder-tag { font-size: .72rem; color: var(--accent); font-weight: 700; margin-bottom: 6px; display: block; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
      .search-wrap input { width: 180px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="./whiteboard.html">← Mission Control</a>
    <h1>🧠 Chappie Brain</h1>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search all files…" autocomplete="off"/>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-title">Folders</div>
      <div id="folderList"></div>
    </nav>

    <main class="main" id="mainContent">
      <div class="empty-state" id="emptyState">
        <div class="icon">🧠</div>
        <h2>Chappie Brain</h2>
        <p>Select a folder on the left to browse files, or use the search bar to find anything.</p>
      </div>
      <div id="fileGrid" style="display:none">
        <div class="folder-header">
          <h2 id="folderTitle"></h2>
          <p id="folderSubtitle"></p>
        </div>
        <div class="file-grid" id="fileCards"></div>
      </div>
      <div class="file-viewer" id="fileViewer">
        <div class="file-viewer-header">
          <button class="back-btn" onclick="closeFile()">← Back</button>
          <h2 id="fileTitle"></h2>
        </div>
        <div class="md-content" id="fileContent"></div>
      </div>
      <div class="search-results" id="searchResults"></div>
    </main>
  </div>

  <script>
    // Folder icons
    const ICONS = {
      '00': '🗂️', '02': '💰', '03': '📊', '07': '📚',
      '08': '🧠', '09': '📥', '10': '🤖', 'Templates': '📋'
    };

    function getIcon(folder) {
      const key = folder.substring(0, 2);
      return ICONS[key] || ICONS[folder] || '📁';
    }

    let currentFolder = null;

    // Build sidebar
    function buildSidebar() {
      const list = document.getElementById('folderList');
      Object.keys(BRAIN_DATA).forEach(folder => {
        const div = document.createElement('div');
        div.className = 'folder-item';
        div.innerHTML = `<span>${getIcon(folder)}</span><span>${folder}</span><span class="count">${BRAIN_DATA[folder].length}</span>`;
        div.onclick = () => openFolder(folder, div);
        list.appendChild(div);
      });
    }

    function openFolder(folder, el) {
      // Update sidebar active state
      document.querySelectorAll('.folder-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      currentFolder = folder;

      // Hide other views
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('fileViewer').classList.remove('active');
      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('fileGrid').style.display = 'block';

      // Set header
      document.getElementById('folderTitle').textContent = getIcon(folder) + ' ' + folder;
      document.getElementById('folderSubtitle').textContent = BRAIN_DATA[folder].length + ' files';

      // Build file cards
      const grid = document.getElementById('fileCards');
      grid.innerHTML = '';
      BRAIN_DATA[folder].forEach((file, idx) => {
        const preview = file.content.replace(/[#*`_\[\]]/g, '').substring(0, 120).trim();
        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `<div class="file-icon">📄</div><h3>${file.name}</h3><p>${preview}…</p>`;
        card.onclick = () => openFile(file);
        grid.appendChild(card);
      });
    }

    function openFile(file) {
      document.getElementById('fileGrid').style.display = 'none';
      document.getElementById('fileViewer').classList.add('active');
      document.getElementById('fileTitle').textContent = file.name;
      document.getElementById('fileContent').innerHTML = renderMarkdown(file.content);
    }

    function closeFile() {
      document.getElementById('fileViewer').classList.remove('active');
      document.getElementById('fileGrid').style.display = 'block';
    }

    // Simple markdown renderer
    function renderMarkdown(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        // Code blocks
        .replace(/```[\s\S]*?```/g, m => `<pre><code>${m.slice(3,-3).replace(/^[a-z]*\n/,'')}</code></pre>`)
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Headers
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // HR
        .replace(/^---$/gm, '<hr>')
        // Blockquote
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        // Unordered lists
        .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
        // Ordered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // Tables (basic)
        .replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g, (m, header, rows) => {
          const ths = header.split('|').filter(s=>s.trim()).map(s=>`<th>${s.trim()}</th>`).join('');
          const trs = rows.trim().split('\n').map(row => {
            const tds = row.split('|').filter(s=>s.trim()).map(s=>`<td>${s.trim()}</td>`).join('');
            return `<tr>${tds}</tr>`;
          }).join('');
          return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
        })
        // Paragraphs
        .replace(/\n\n([^<\n][^\n]+)/g, '\n\n<p>$1</p>')
        .replace(/\n/g, '\n');
    }

    // Search
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      if (q.length < 2) {
        document.getElementById('searchResults').classList.remove('active');
        if (currentFolder) {
          document.getElementById('fileGrid').style.display = 'block';
        } else {
          document.getElementById('emptyState').style.display = 'block';
        }
        return;
      }

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('fileGrid').style.display = 'none';
      document.getElementById('fileViewer').classList.remove('active');

      const results = [];
      Object.keys(BRAIN_DATA).forEach(folder => {
        BRAIN_DATA[folder].forEach(file => {
          if (file.name.toLowerCase().includes(q) || file.content.toLowerCase().includes(q)) {
            results.push({ folder, file });
          }
        });
      });

      const container = document.getElementById('searchResults');
      container.classList.add('active');
      if (results.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No results found for "' + q + '"</p></div>';
        return;
      }

      container.innerHTML = `<h3 style="margin-bottom:16px;font-size:.95rem;color:var(--muted)">${results.length} result${results.length>1?'s':''} for "${q}"</h3>`;
      results.forEach(({folder, file}) => {
        const idx = file.content.toLowerCase().indexOf(q);
        const snippet = idx >= 0 ? '…' + file.content.substring(Math.max(0,idx-40), idx+80).replace(/[#*`]/g,'') + '…' : '';
        const div = document.createElement('div');
        div.className = 'search-result';
        div.innerHTML = `<span class="folder-tag">${getIcon(folder)} ${folder}</span><h4>${file.name}</h4><p>${snippet}</p>`;
        div.onclick = () => { searchInput.value = ''; container.classList.remove('active'); openFile(file); };
        container.appendChild(div);
      });
    });

    buildSidebar();
  </script>
</body>
</html>
