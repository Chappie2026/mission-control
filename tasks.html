<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks | Mission Control</title>
  <style>
    :root{--bg:#0d1b2a;--panel:#1a2d42;--panel-soft:#1e3350;--text:#e2eaf3;--muted:#8aa5bf;--line:#2a3f55;--accent:#2cb1bc;--success:#2ec46a;--danger:#e05555;--warning:#f0b429;--radius:14px}
    [data-theme="light"]{--bg:#f4f8fb;--panel:#fff;--panel-soft:#eef4f8;--text:#102a43;--muted:#486581;--line:#d9e2ec}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:16px}
    .topbar-logo{font-weight:800;font-size:1.1rem;color:var(--accent);text-decoration:none}
    .topbar-title{font-weight:700;font-size:1rem;flex:1}
    .topbar-btn{padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--panel-soft);color:var(--text);font-weight:700;font-size:.85rem;cursor:pointer}
    .wrap{max-width:900px;margin:0 auto;padding:24px}
    .task-group{margin-bottom:24px}
    .task-group-header{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--line)}
    .task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
    .task-item:hover{border-color:var(--accent)}
    .task-check{width:22px;height:22px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s}
    .task-check.done{background:var(--success);border-color:var(--success);color:#fff;font-size:.75rem}
    .task-body{flex:1}
    .task-title{font-weight:700;font-size:.92rem}
    .task-title.done{text-decoration:line-through;color:var(--muted)}
    .task-meta{font-size:.78rem;color:var(--muted);margin-top:4px}
    .task-priority{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;margin-left:6px}
    .priority-high{background:rgba(224,85,85,.15);color:var(--danger)}
    .priority-med{background:rgba(240,180,41,.15);color:var(--warning)}
    .priority-low{background:rgba(44,177,188,.15);color:var(--accent)}
    .task-dept{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:4px}
    .dept-debt{background:rgba(44,177,188,.15);color:var(--accent)}
    .dept-eng{background:rgba(240,180,41,.15);color:var(--warning)}
    .dept-biz{background:rgba(155,93,229,.15);color:#9b5de5}
    .dept-ops{background:rgba(224,85,85,.15);color:var(--danger)}
    .dept-mkt{background:rgba(46,196,106,.15);color:var(--success)}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="whiteboard.html" class="topbar-logo">🤖 Chappie</a>
    <div class="topbar-title">Tasks</div>
    <button class="topbar-btn" onclick="toggleTheme()">🌓</button>
  </div>
  <div class="wrap" id="app"></div>
  <script>
    function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'))}
    const s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s);

    const TASKS=[
      {title:'Add savings projection to debt.html frontend',dept:'eng',priority:'high',done:false},
      {title:'Add reminders & progress tracking to Nova',dept:'debt',priority:'high',done:false},
      {title:'Add daily/weekly advice feature to Nova',dept:'debt',priority:'med',done:false},
      {title:'Mobile polish for debt.html',dept:'eng',priority:'med',done:false},
      {title:'Build Trader Joe bot with Qwen 3.6 Plus',dept:'eng',priority:'med',done:false},
      {title:'Fix Trader Joe model migration',dept:'eng',priority:'high',done:false},
      {title:'Deploy Mission Control to Cloudflare Pages',dept:'ops',priority:'med',done:false},
      {title:'Add D1 table for progress tracking',dept:'eng',priority:'low',done:false},
      {title:'Business consulting page (Phase 2)',dept:'biz',priority:'low',done:false},
      {title:'Build Pro tier features (PDF export, reminders)',dept:'mkt',priority:'low',done:false},
      {title:'Pricing page on debt.html',dept:'mkt',priority:'low',done:false},
      {title:'Move secrets from secrets.txt to env vars',dept:'ops',priority:'med',done:false},
    ];

    const done=new Set(JSON.parse(localStorage.getItem('doneTasks')||'[]'));

    function render(){
      const groups={high:[],med:[],low:[]};
      TASKS.forEach((t,i)=>{
        t.done=done.has(i);
        const key=t.priority==='high'?'high':t.priority==='med'?'med':'low';
        groups[key].push({...t,idx:i});
      });

      const sec=(label,items)=>items.length?`
        <div class="task-group">
          <div class="task-group-header">${label}</div>
          ${items.map(t=>`
            <div class="task-item" onclick="toggle(${t.idx})">
              <div class="task-check ${t.done?'done':''}">${t.done?'✓':''}</div>
              <div class="task-body">
                <span class="task-title ${t.done?'done':''}">${t.title}</span>
                <span class="task-priority priority-${t.priority}">${t.priority}</span>
                <span class="task-dept dept-${t.dept}">${t.dept}</span>
              </div>
            </div>
          `).join('')}
        </div>`:'';

      document.getElementById('app').innerHTML=sec('🔴 High Priority',groups.high)+sec('🟡 Medium Priority',groups.med)+sec('🟢 Low Priority',groups.low);
    }

    function toggle(i){if(done.has(i))done.delete(i);else done.add(i);localStorage.setItem('doneTasks',JSON.stringify([...done]));render()}
    render();
  </script>
</body>
</html>
